spring.application.name=file-organizer
server.port=5000

# Embedded file database located in the project's 'db' directory
spring.datasource.url=jdbc:h2:file:./db/fileorganizer;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Allow H2 console for debugging (optional, only runs locally)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
